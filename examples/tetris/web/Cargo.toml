[package]
name = "tetris_web"
version = "0.1.0"
authors = ["Stephen Sherratt <stephen@sherra.tt>"]
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
chargrid_web = { path = "../../../web" }
tetris_app = { path = "../app" }
wasm-bindgen = "0.2"
rand = "0.9"
getrandom = { version = "0.3", features = ["wasm_js"] }
console_error_panic_hook = "0.1"
wasm-logger = "0.2"
log = "0.4"
